version: v1.0
name: M03
agent:
  machine:
    type: f1-standard-4
    os_image: ubuntu2404
fail_fast:
  stop:
    when: branch != 'main'
auto_cancel:
  running:
    when: branch != 'main'
  queued:
    when: branch = 'main'
blocks:
  - name: "\U0001F680 Deploy"
    dependencies:
      - DAST
    task:
      secrets:
        - name: Rusic_private.key
        - name: Rusic_public.key
      jobs:
        - name: "\U0001F30D Deploy to Production"
          commands:
            - echo "Configuring deployment credentials..."
            - echo "Updating container service..."
            - echo "Rolling out new containers..."
            - echo "Deployment completed successfully!"
  - name: Code Signing
    dependencies: []
    task:
      jobs:
        - name: Signing
          commands:
            - gpg --import /home/semaphore/public.key
            - gpg --import /home/semaphore/private.key
            - checkout
            - cd 1-signing
            - gpg --output artifact.txt.sig --detach-sign artifact.txt
            - gpg --verify artifact.txt.sig artifact.txt
      secrets:
        - name: Rusic_private.key
        - name: Rusic_public.key
  - name: Generate an SBOM
    dependencies:
      - Code Signing
    task:
      jobs:
        - name: SBOM
          commands:
            - checkout
            - cd 2-sbom
            - pip install cyclonedx-bom
            - 'export PATH=$PATH:/home/semaphore/.local/bin'
            - cyclonedx-py requirements -o bom.json
  - name: Run dependency scanning
    dependencies:
      - Generate an SBOM
    task:
      jobs:
        - name: Check for vulnerabilities
          commands:
            - checkout
            - cd 3-dependency-scanning
            - sudo apt-get update -y && sudo apt-get install -y python3.12-venv
            - python3 -m venv venv
            - source venv/bin/activate
            - pip install pip-audit
            - pip-audit -r requirements.txt
  - name: SAST testing
    dependencies:
      - Run dependency scanning
    task:
      jobs:
        - name: Run Bandit SAST detection tool
          commands:
            - checkout
            - cd 4-sast
            - pip install bandit
            - 'export PATH=$PATH:/home/semaphore/.local/bin'
            - bandit -r vulnerable_script.py
  - name: DAST
    dependencies:
      - SAST testing
    task:
      jobs:
        - name: Run DAST against the application.
          commands:
            - checkout
            - cd 5-dast
            - sudo apt-get update -y && sudo apt-get install -y python3.12-venv && sudo  apt install -y gunicorn
            - python3 -m venv venv
            - source venv/bin/activate
            - pip install wapiti3
            - 'export PATH=$PATH:/home/semaphore/.local/bin'
            - 'gunicorn -b 0:0:0:0:4000 app:app --daemon'
            - 'wapiti -u http://localhost:4000 -f html'
            - artifact push workflow /home/semaphore/.wapiti/generated_report/localhost*.html
