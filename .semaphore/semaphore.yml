version: v1.0
name: M03
agent:
  machine:
    type: f1-standard-4
    os_image: ubuntu2404
  containers:
    - name: main
      image: 'registry.semaphoreci.com/node:20'
    - name: postgres
      image: 'registry.semaphoreci.com/postgres:17'
    - name: redis
      image: 'registry.semaphoreci.com/redis:7.0'
fail_fast:
  stop:
    when: branch != 'main'
auto_cancel:
  running:
    when: branch != 'main'
  queued:
    when: branch = 'main'
blocks:
  - name: "\U0001F680 Deploy"
    dependencies:
      - Generate SBOM
    task:
      secrets:
        - name: Rusic_private.key
        - name: Rusic_public.key
      jobs:
        - name: "\U0001F30D Deploy to Production"
          commands:
            - echo "Configuring deployment credentials..."
            - echo "Updating container service..."
            - echo "Rolling out new containers..."
            - echo "Deployment completed successfully!"
  - name: Signing
    dependencies: []
    task:
      jobs:
        - name: 1-signing
          commands:
            - gpg --import /home/semaphore/public.key
            - gpg --import /home/semaphore/private.key
            - checkout
            - cd 1-signing
            - gpg --output artifact.txt.sig --detach-sign artifact.txt
            - gpg --verify artifact.txt.sig artifact.txt
      secrets:
        - name: Rusic_private.key
        - name: Rusic_public.key
  - name: Generate SBOM
    dependencies:
      - Signing
    task:
      jobs:
        - name: SBOM
          commands:
            - pip install cyclonedx-bom
            - cyclonedx-py requirements requirements.txt -o bom.json
